name: Deploy report to GitHub Pages

# Builds the static Quarto report and publishes report/_site to GitHub Pages.
# The report uses `execute: enabled: false`, so the runner only needs Quarto —
# no Python, no data, no model. Fast and deterministic.

on:
  push:
    branches: [main]
    paths: ["report/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render report
        run: quarto render report
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
